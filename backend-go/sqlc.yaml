version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/queries"
    schema: "migrations/000001_initial.up.sql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        emit_json_tags: true
        emit_db_tags: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "timestamptz"
            go_type: "time.Time"
