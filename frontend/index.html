<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rally" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rally — Match Generator</title>
    <meta name="description" content="Stop doing the math. Start playing. Fair match rotation for pickleball, tennis, badminton, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rally" />
    <meta property="og:url" content="https://match.amoresjan.dev/" />
    <meta property="og:title" content="Rally — Match Generator" />
    <meta property="og:description" content="Stop doing the math. Start playing. Fair match rotation for pickleball, tennis, badminton, and more." />
    <meta property="og:image" content="https://match.amoresjan.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rally — Match Generator" />
    <meta name="twitter:description" content="Stop doing the math. Start playing. Fair match rotation for pickleball, tennis, badminton, and more." />
    <meta name="twitter:image" content="https://match.amoresjan.dev/og-image.png" />
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        #rally-shell {
          min-height: 100dvh;
          background: #ffffff;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .dark #rally-shell { background: #020817; }
        #rally-shell-wordmark {
          font-size: 1.25rem;
          font-weight: 700;
          color: #16a34a;
          letter-spacing: -0.01em;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 10px;
        }
        .dark #rally-shell-wordmark { color: #22c55e; }
        #rally-shell-dot {
          width: 5px;
          height: 5px;
          border-radius: 50%;
          background: #16a34a;
          animation: rally-boot 1.2s ease-in-out infinite;
        }
        .dark #rally-shell-dot { background: #22c55e; }
        @keyframes rally-boot {
          0%, 100% { opacity: 0.25; transform: scale(0.75); }
          50% { opacity: 1; transform: scale(1); }
        }
        @media (prefers-reduced-motion: reduce) {
          #rally-shell-dot { animation: none; opacity: 0.5; }
        }
      </style>
      <div id="rally-shell">
        <div id="rally-shell-wordmark">
          Rally
          <div id="rally-shell-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
